<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚空索引 — 个人日志</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;600&family=Noto+Sans+SC:wght@300;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="void-canvas" aria-hidden="true"></canvas>
  <div class="grid-floor" aria-hidden="true"></div>

  <header class="hud">
    <div class="hud__brand">
      <span class="hud__glyph">◇</span>
      <span class="hud__title">VOID.LOG</span>
    </div>
    <p class="hud__tag">个人记录 / 无重力阅览</p>
  </header>

  <main class="stage">
    <aside class="figure" aria-hidden="true">
      <svg class="figure__svg" viewBox="0 0 120 280" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(120,220,255,0.9)" />
            <stop offset="100%" stop-color="rgba(60,100,200,0.35)" />
          </linearGradient>
        </defs>
        <ellipse cx="60" cy="38" rx="18" ry="22" stroke="url(#fg)" stroke-width="1.2" />
        <path d="M60 62v52M38 98l22-14 22 14M60 114l-18 68M60 114l18 68M42 150l-16 52M78 150l16 52" stroke="url(#fg)" stroke-width="1.2" stroke-linecap="round" />
      </svg>
      <span class="figure__label">OPERATOR</span>
    </aside>

    <section class="feed-wrap">
      <p class="feed-hint">滚动或拖拽列表 · 点击进入</p>
      <div class="feed-scene" id="feed-scene">
        <ul class="feed" id="feed" role="list"></ul>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" hidden aria-modal="true" role="dialog">
    <button type="button" class="lightbox__close" id="lb-close" aria-label="关闭">×</button>
    <div class="lightbox__frame">
      <div class="lightbox__scan"></div>
      <img class="lightbox__img" id="lb-img" alt="" />
      <div class="lightbox__meta">
        <h2 class="lightbox__title" id="lb-title"></h2>
        <time class="lightbox__time" id="lb-time"></time>
        <p class="lightbox__body" id="lb-body"></p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
