<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOID LOG — 个人日志</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="void-bg" aria-hidden="true">
    <div class="line-field line-field--far"></div>
    <div class="line-field line-field--mid"></div>
    <div class="line-field line-field--near"></div>
    <div class="void-bloom"></div>
    <div class="void-scan"></div>
  </div>

  <div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>

  <header class="hud-top">
    <div class="hud-brand">
      <span class="hud-mark">◇</span>
      <span class="hud-title">VOID.LOG</span>
      <span class="hud-sub">十字轨道 / 玻璃缓存</span>
    </div>
    <div class="hud-meta">
      <span id="clock">--:--:--</span>
      <span class="sep">│</span>
      <span>DEPTH: <span id="depthVal">0.00</span></span>
    </div>
  </header>

  <main class="stage">
    <section class="intro-panel">
      <p class="intro-line">横轨与竖轨在虚空里交叉；条目像数据带一样延伸。点击后银线迸发，选中图在空白中央浮出。</p>
      <p class="intro-hint">滚轮：在竖带区域上下滑，其余区域左右滑 · Esc 关闭</p>
    </section>

    <div class="cross-stage" id="crossStage">
      <div class="rail rail--h" id="railH" role="region" aria-label="横向图像带">
        <div class="rail-track rail-track--h" id="trackH"></div>
      </div>
      <div class="rail rail--v" id="railV" role="region" aria-label="纵向图像带">
        <div class="rail-track rail-track--v" id="trackV"></div>
      </div>
      <div class="cross-glass cross-glass--h" aria-hidden="true"></div>
      <div class="cross-glass cross-glass--v" aria-hidden="true"></div>
    </div>
  </main>

  <footer class="hud-bottom">
    <span>ANTI-DRIFT</span>
    <span class="footer-quote">纵使人们都认为你在说谎</span>
    <span>LINK STABLE</span>
  </footer>

  <div class="lightbox" id="lightbox" hidden>
    <div class="lb-ribbons" id="lbRibbons" aria-hidden="true"></div>
    <div class="lb-grid-faint" aria-hidden="true"></div>
    <div class="lb-diamond-field" id="lbDiamond" aria-hidden="true"></div>
    <button type="button" class="lightbox-close" id="lbClose" aria-label="关闭">×</button>
    <div class="lightbox-hero-wrap">
      <div class="lightbox-frame">
        <div class="lightbox-img-shell">
          <img class="lightbox-img" id="lbImg" alt="" />
        </div>
        <div class="lightbox-caption">
          <h2 id="lbTitle"></h2>
          <p id="lbExcerpt"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
