<!DOCTYPE html>
<html lang="en">
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maya970's Cyber Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <title>VOID LOG — 个人日志</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="ui-overlay">
    <div class="profile-card">
      <img src="assets/avatar.png" alt="Avatar" class="avatar" />
      <h1>Maya970</h1>
      <p>Level 99 Code Sorcerer</p>
      <div class="socials">
        <a href="https://twitter.com/maya970"><img src="https://img.icons8.com/color/32/twitter.png"/></a>
        <a href="https://github.com/maya970"><img src="https://img.icons8.com/color/32/github.png"/></a>
        <a href="https://linkedin.com/in/maya970"><img src="https://img.icons8.com/color/32/linkedin.png"/></a>
  <div class="void-bg" aria-hidden="true">
    <div class="void-grid"></div>
    <div class="void-glow"></div>
    <div class="void-scan"></div>
  </div>

  <div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>

  <header class="hud-top">
    <div class="hud-brand">
      <span class="hud-mark">◇</span>
      <span class="hud-title">VOID.LOG</span>
      <span class="hud-sub">个人节点 / 静态缓存</span>
    </div>
    <div class="hud-meta">
      <span id="clock">--:--:--</span>
      <span class="sep">│</span>
      <span>DEPTH: <span id="depthVal">0.00</span></span>
    </div>
  </header>

  <main class="stage">
    <section class="intro-panel">
      <p class="intro-line">在空白数据海里滑动条目，点击以展开图像层。</p>
      <p class="intro-hint">← 横向滑动 / 滚轮（Shift+滚轮）→</p>
    </section>

    <div class="perspective-wrap">
      <div class="rail-connector" aria-hidden="true"></div>
      <div class="list-scroller" id="scroller" role="region" aria-label="文章滑动条带">
        <!-- cards injected by JS -->
      </div>
    </div>
    <div class="skill-detail" id="skill-detail">
      <h2 id="skill-name">Select a Skill</h2>
      <p id="skill-desc">Click a skill card to view details</p>
  </main>

  <footer class="hud-bottom">
    <span>ANTI-DRIFT</span>
    <span class="footer-quote" id="footerQuote">纵使人们都认为你在说谎</span>
    <span>LINK STABLE</span>
  </footer>

  <div class="lightbox" id="lightbox" hidden>
    <button type="button" class="lightbox-close" id="lbClose" aria-label="关闭">×</button>
    <div class="lightbox-frame">
      <img class="lightbox-img" id="lbImg" alt="" />
      <div class="lightbox-caption">
        <h2 id="lbTitle"></h2>
        <p id="lbExcerpt"></p>
      </div>
    </div>
  </div>
  <script type="module" src="main.js"></script>

  <script src="./app.js"></script>
</body>
</html>
